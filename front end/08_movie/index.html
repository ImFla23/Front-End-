<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyMovie</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="main-container">
      <header class="top-bar">
        <div class="header-in-container">
          <div class="title-container">
            <svg
              class="w-6 h-6 text-gray-800 dark:text-white"
              aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg"
              width="35"
              height="35"
              fill="#b1c6a8"
              viewBox="0 0 24 24"
            >
              <path
                fill-rule="evenodd"
                d="M19.003 3A2 2 0 0 1 21 5v2h-2V5.414L17.414 7h-2.828l2-2h-2.172l-2 2H9.586l2-2H9.414l-2 2H3V5a2 2 0 0 1 2-2h14.003ZM3 9v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9H3Zm2-2.414L6.586 5H5v1.586Zm4.553 4.52a1 1 0 0 1 1.047.094l4 3a1 1 0 0 1 0 1.6l-4 3A1 1 0 0 1 9 18v-6a1 1 0 0 1 .553-.894Z"
                clip-rule="evenodd"
              />
            </svg>

            <h1 class="Title">MyMovie</h1>
          </div>

          <button onclick="showPopUp()" class="add-button">
            <p class="text-button">New Movie</p>
          </button>
        </div>
      </header>

      <div class="center-div">
        <div class="little-suggest-div">
          <h3>Your personal movie database!</h3>
        </div>
        <div onclick="closePopUp()" class="translucent-close-div close-divs">
          <div class="add-popup">
            <button 
            onclick="closePopUp()"
            class="x-close">
              <svg
                class="x-svg"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M5 12h14m-7 7V5"
                />
              </svg>
            </button>
            <div class="form-container">
              <label class="Title-form" for="Name">Film's Name</label>
              <input class="nameFilm" type="text" name="Name" />
            </div>
            <div class="form-container">
              <label class="Title-form" for="review">Reviw</label>
              <input class="reviewFilm" type="number" max="5" min="1"  name="review" />
            </div>
            <div class="form-container">
              <label class="Title-form" for="image">Review description</label>
              <input class="writtenReview" type="text" name="image" />
            </div>
            <div class="form-container">
              <label class="Title-form" for="image">Url Image</label>
              <input class="ImageFilm" type="text" name="image" />
            </div>
            <button 
            onclick="addFilm()"
            class="add-button" >
              <p class="text-button">Add Movie</p>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
