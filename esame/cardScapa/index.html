<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scarpe assurde</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box-pagina">
      <div class="card-sfondo">
        <div class="box-cuore">
          <svg
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="white"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M12.01 6.001C6.5 1 1 8 5.782 13.001L12.011 20l6.23-7C23 8 17.5 1 12.01 6.002Z"
            />
          </svg>
        </div>
        <div class="box-flex-flag">
          <div class="box-cambio">
            <p>CAMBIO20</p>
          </div>
          <div class="box-promo">
            <p>Promo</p>
          </div>
        </div>
        <img
          class="immagine-articolo"
          src="https://m.media-amazon.com/images/I/61nAL4xJ9yL._AC_UY900_.jpg"
          alt="swag scarpe"
        />
        <div class="box-testo">
          <h3 class="nome-scarpa">Shreck scarpa</h3>
          <p class="descrizione-articolo">ciabatte basse calde - Shreck</p>

          <h3 class="prezzo">567, 00 €</h3>

          <p class="mediano">
            prezzo mediano: <span class="prezzo-tagliato">1024 €</span> -55%
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
